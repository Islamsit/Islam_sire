<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إسلام ويب - التطبيق الشامل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f1f5f9; padding-bottom: 100px; }
        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-item.active { color: #10b981; }
    </style>
</head>
<body>

    <header class="bg-emerald-800 text-white p-6 shadow-2xl rounded-b-[2.5rem] text-center mb-6">
        <h1 class="text-2xl font-bold">إسلام ويب</h1>
        <div id="location-text" class="text-[10px] opacity-60 mt-1 uppercase italic text-emerald-100">جاري جلب المواقيت...</div>
    </header>

    <div class="container max-w-md mx-auto px-6">
        
        <section id="prayers" class="section active">
            <div class="bg-white rounded-3xl p-6 shadow-xl text-center mb-6 border border-emerald-50">
                <h2 id="next-prayer-name" class="text-emerald-600 font-bold mb-1">صلاة القادمة</h2>
                <div id="countdown" class="text-5xl font-black text-gray-800 tabular-nums">00:00:00</div>
            </div>
            <div id="prayer-list" class="space-y-3"></div>
        </section>

        <section id="tasbeeh" class="section">
            <div class="bg-white rounded-3xl p-10 shadow-xl text-center">
                <div id="sebha-count" class="text-7xl font-black text-emerald-600 mb-6">0</div>
                <button onclick="countUp()" class="w-36 h-36 rounded-full bg-emerald-600 text-white text-3xl shadow-lg active:scale-90 transition-all border-8 border-emerald-50 mx-auto flex items-center justify-center">
                    <i class="fa-solid fa-plus"></i>
                </button>
                <button onclick="resetCount()" class="mt-6 text-gray-400 text-xs underline">تصفير</button>
            </div>
        </section>

        <section id="azkar" class="section">
            <div class="bg-white rounded-3xl p-6 shadow-lg border-r-8 border-emerald-500 mb-6">
                <h3 class="font-bold text-emerald-900 text-xl mb-3">ذكر اليوم</h3>
                <p id="azkar-content" class="text-gray-600 leading-relaxed text-lg">"سبحان الله وبحمده، سبحان الله العظيم"</p>
            </div>
            <div class="grid grid-cols-1 gap-4">
                <div class="p-5 rounded-2xl bg-emerald-50 text-emerald-700 font-bold flex items-center justify-between px-8 border border-emerald-100">
                    <span>أذكار الصباح</span>
                    <i class="fa-solid fa-sun"></i>
                </div>
                <div class="p-5 rounded-2xl bg-blue-50 text-blue-700 font-bold flex items-center justify-between px-8 border border-blue-100">
                    <span>أذكار المساء</span>
                    <i class="fa-solid fa-moon"></i>
                </div>
            </div>
        </section>

    </div>

    <nav class="fixed bottom-4 left-4 right-4 h-16 bg-white rounded-2xl shadow-2xl flex justify-around items-center px-2 z-50 border border-gray-100">
        <button onclick="showSection('prayers')" class="nav-item active flex flex-col items-center">
            <i class="fa-solid fa-clock text-xl"></i><span class="text-[10px] font-bold">المواقيت</span>
        </button>
        <button onclick="showSection('tasbeeh')" class="nav-item flex flex-col items-center text-gray-400">
            <i class="fa-solid fa-beads-prayers text-xl"></i><span class="text-[10px] font-bold">السبحة</span>
        </button>
        <button onclick="showSection('azkar')" class="nav-item flex flex-col items-center text-gray-400">
            <i class="fa-solid fa-book-open-reader text-xl"></i><span class="text-[10px] font-bold">الأذكار</span>
        </button>
    </nav>

    <script>
        let pTimes = {};
        let sCount = 0;

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => {
                i.classList.remove('active'); i.classList.add('text-gray-400');
            });
            event.currentTarget.classList.add('active');
            event.currentTarget.classList.remove('text-gray-400');
        }

        function countUp() { 
            sCount++; document.getElementById('sebha-count').innerText = sCount;
            if(navigator.vibrate) navigator.vibrate(40);
        }
        function resetCount() { sCount = 0; document.getElementById('sebha-count').innerText = 0; }

        async function getPrayers(lat, lon) {
            try {
                const r = await fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=4`);
                const d = await r.json();
                pTimes = d.data.timings;
                document.getElementById('location-text').innerText = "توقيتك الحالي: " + d.data.meta.timezone;
                render();
                startTimer();
            } catch(e) { getPrayers(21.4225, 39.8262); }
        }

        function render() {
            const list = {"الفجر": pTimes.Fajr, "الظهر": pTimes.Dhuhr, "العصر": pTimes.Asr, "المغرب": pTimes.Maghrib, "العشاء": pTimes.Isha};
            let h = '';
            for(const [n, t] of Object.entries(list)) {
                h += `<div class="flex justify-between p-4 bg-white rounded-2xl shadow-sm border border-gray-50 mb-2 font-bold text-gray-700"><span>${n}</span><span class="text-emerald-600 font-black">${t}</span></div>`;
            }
            document.getElementById('prayer-list').innerHTML = h;
        }

        function startTimer() {
            setInterval(() => {
                if(!pTimes.Fajr) return;
                const now
