<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إسلام ويب تركيا | مواقيت وخدمات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #f8fafc; }
        .service-btn { transition: all 0.2s; border: 1px solid #e2e8f0; }
        .service-btn:active { transform: scale(0.95); background: #f0fdf4; }
    </style>
</head>
<body class="pb-10">

    <header class="bg-emerald-700 text-white p-6 rounded-b-[2.5rem] shadow-lg mb-6 text-center">
        <h1 class="text-2xl font-black italic">إسلام ويب</h1>
        <p class="text-xs opacity-80">مواقيت الصلاة وخدمات تركيا</p>
    </header>

    <div class="max-w-md mx-auto px-4">
        
        <div class="bg-white rounded-3xl p-6 shadow-sm mb-6 text-center border-b-4 border-emerald-500">
            <p class="text-gray-500 text-sm font-bold mb-1">المتبقي لصلاة القادمة</p>
            <h2 class="text-5xl font-black text-slate-800 tracking-tighter tabular-nums" id="timer">00:00:00</h2>
        </div>

        <div id="prayer-list" class="space-y-2 mb-8">
            </div>

        <h3 class="font-black text-slate-700 mb-4 px-2 flex items-center">
            <i class="fa-solid fa-link ml-2 text-emerald-600"></i> روابط تهمك في تركيا
        </h3>
        <div class="grid grid-cols-2 gap-3 mb-8">
            <a href="https://www.turkiye.gov.tr/" target="_blank" class="service-btn bg-white p-4 rounded-2xl flex flex-col items-center shadow-sm">
                <i class="fa-solid fa-id-card text-blue-600 text-2xl mb-2"></i>
                <span class="text-[11px] font-bold text-gray-700">سند إقامة</span>
            </a>
            <a href="https://randevu.nvi.gov.tr/" target="_blank" class="service-btn bg-white p-4 rounded-2xl flex flex-col items-center shadow-sm">
                <i class="fa-solid fa-calendar-check text-emerald-600 text-2xl mb-2"></i>
                <span class="text-[11px] font-bold text-gray-700">موعد نفوس</span>
            </a>
        </div>

        <div class="bg-white rounded-3xl p-6 shadow-sm border text-center mb-8">
            <h3 class="text-xs font-bold text-gray-400 mb-2">السبحة الإلكترونية</h3>
            <div id="count" class="text-6xl font-black text-emerald-700 mb-4">0</div>
            <button onclick="countUp()" class="w-24 h-24 rounded-full bg-emerald-600 text-white text-3xl shadow-xl active:scale-90 mx-auto flex items-center justify-center border-4 border-emerald-50">
                <i class="fa fa-plus"></i>
            </button>
            <button onclick="resetCount()" class="mt-4 text-gray-300 text-[10px] underline">تصفير العداد</button>
        </div>

    </div>

    <footer class="mt-10 text-center px-6">
        <div class="flex justify-center gap-4 text-[10px] text-gray-400 font-bold mb-4">
            <span onclick="alert('نحن نحترم خصوصيتك')" class="cursor-pointer">سياسة الخصوصية</span>
            <span onclick="alert('موقع خدمي للعرب في تركيا')" class="cursor-pointer">من نحن</span>
        </div>
        <p class="text-[9px] text-gray-300">جميع الحقوق محفوظة © 2026</p>
    </footer>

    <script>
        // كود السبحة
        let counter = 0;
        function countUp() { counter++; document.getElementById('count').innerText = counter; if(navigator.vibrate) navigator.vibrate(20); }
        function resetCount() { counter = 0; document.getElementById('count').innerText = 0; }

        // كود المواقيت
        let pTimes = {"Fajr":"05:20","Dhuhr":"12:30","Asr":"15:50","Maghrib":"18:40","Isha":"20:05"};
        
        async function getPrayers(lat = 36.8, lon = 34.6) {
            try {
                const r = await fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=13`);
                const d = await r.json();
                pTimes = d.data.timings;
                let html = '';
                const map = {"الفجر":pTimes.Fajr,"الظهر":pTimes.Dhuhr,"العصر":pTimes.Asr,"المغرب":pTimes.Maghrib,"العشاء":pTimes.Isha};
                for(let [n,v] of Object.entries(map)) {
                    html += `<div class="flex justify-between p-4 bg-white rounded-xl shadow-sm border-r-4 border-emerald-500 font-bold text-sm mb-2"><span class="text-slate-500">${n}</span><span class="text-emerald-700">${v}</span></div>`;
                }
                document.getElementById('prayer-list').innerHTML = html;
            } catch(e) {}
        }

        setInterval(() => {
            const now = new Date();
            let next = null;
            const times = [pTimes.Fajr, pTimes.Dhuhr, pTimes.Asr, pTimes.Maghrib, pTimes.Isha];
            for(let t of times) {
                let [h, m] = t.split(':');
                let d = new Date(); d.setHours(h,m,0);
                if(d > now) { next = d; break; }
            }
            if(!next) { let [h,m] = pTimes.Fajr.split(':'); next = new Date(); next.setDate(next.getDate()+1); next.setHours(h,m,0); }
            let diff = next - now;
            let hh = Math.floor(diff/3600000); let mm = Math.floor((diff%3600000)/60000); let ss = Math.floor((diff%60000)/1000);
            document.getElementById('timer').innerText = `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
        }, 1000);

        getPrayers();
    </script>
</body>
</html>
