<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إسلام ويب</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f1f5f9; padding-bottom: 100px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-item.active { color: #10b981; border-top: 2px solid #10b981; }
    </style>
</head>
<body>

    <header class="bg-emerald-800 text-white p-6 text-center rounded-b-[2rem] shadow-lg mb-4">
        <h1 class="text-2xl font-bold">إسلام ويب</h1>
    </header>

    <div class="max-w-md mx-auto px-4">
        <div id="prayers" class="tab-content active">
            <div class="bg-white rounded-2xl p-6 shadow-md text-center mb-4">
                <div id="next-prayer" class="text-emerald-600 text-sm font-bold mb-1 italic">جاري التحميل...</div>
                <div id="timer" class="text-5xl font-black text-gray-800 tabular-nums">00:00:00</div>
            </div>
            <div id="list" class="space-y-2"></div>
        </div>

        <div id="sebha" class="tab-content">
            <div class="bg-white rounded-2xl p-8 shadow-md text-center">
                <div id="count" class="text-7xl font-bold text-emerald-600 mb-6">0</div>
                <button onclick="add()" class="w-32 h-32 rounded-full bg-emerald-600 text-white text-4xl shadow-xl active:scale-90 mx-auto flex items-center justify-center border-4 border-emerald-50"><i class="fa fa-plus"></i></button>
                <button onclick="reset()" class="mt-6 text-gray-400 text-xs underline block mx-auto">تصفير</button>
            </div>
        </div>

        <div id="azkar" class="tab-content">
            <div class="bg-white rounded-2xl p-6 shadow-md border-r-4 border-emerald-500 mb-4">
                <h3 class="font-bold mb-2">ذكر اليوم</h3>
                <p class="text-gray-600 italic">"سبحان الله وبحمده، سبحان الله العظيم"</p>
            </div>
            <div class="space-y-2">
                <div class="p-4 bg-emerald-50 rounded-xl font-bold text-emerald-700 flex justify-between"><span>أذكار الصباح</span> <i class="fa fa-sun"></i></div>
                <div class="p-4 bg-blue-50 rounded-xl font-bold text-blue-700 flex justify-between"><span>أذكار المساء</span> <i class="fa fa-moon"></i></div>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around py-3 shadow-2xl z-50">
        <button onclick="tab('prayers')" class="nav-btn active nav-item flex flex-col items-center w-1/3">
            <i class="fa fa-clock text-xl"></i><span class="text-[10px]">المواقيت</span>
        </button>
        <button onclick="tab('sebha')" class="nav-btn nav-item flex flex-col items-center w-1/3 text-gray-400">
            <i class="fa fa-beads-prayers text-xl"></i><span class="text-[10px]">السبحة</span>
        </button>
        <button onclick="tab('azkar')" class="nav-btn nav-item flex flex-col items-center w-1/3 text-gray-400">
            <i class="fa fa-book-open text-xl"></i><span class="text-[10px]">الأذكار</span>
        </button>
    </nav>

    <script>
        let counter = 0;
        function add() { counter++; document.getElementById('count').innerText = counter; if(navigator.vibrate) navigator.vibrate(30); }
        function reset() { counter = 0; document.getElementById('count').innerText = 0; }

        function tab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => { b.classList.add('text-gray-400'); b.classList.remove('active'); });
            event.currentTarget.classList.add('active');
            event.currentTarget.classList.remove('text-gray-400');
        }

        async function init(lat = 21.4225, lon = 39.8262) {
            try {
                const res = await fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=4`);
                const json = await res.json();
                const t = json.data.timings;
                const list = {"الفجر":t.Fajr, "الظهر":t.Dhuhr, "العصر":t.Asr, "المغرب":t.Maghrib, "العشاء":t.Isha};
                let h = '';
                for(let [n,v] of Object.entries(list)) h += `<div class="flex justify-between p-4 bg-white rounded-xl shadow-sm border border-gray-50"><b>${n}</b><b class="text-emerald-700">${v}</b></div>`;
                document.getElementById('list').innerHTML = h;
                
                setInterval(() => {
                    const now = new Date();
                    let next = null;
                    for(let [n,v] of Object.entries(list)) {
                        let [hh,mm] = v.split(':');
                        let d = new Date(); d.setHours(hh,mm,0);
                        if(d > now) { next = {n,d}; break; }
                    }
                    if(!next) { let [hh,mm] = t.Fajr.split(':'); let d = new Date(); d.setDate(d.getDate()+1); d.setHours(hh,mm,0); next = {n:"الفجر",d}; }
                    let diff = next.d - now;
                    let hh = Math.floor(diff/3600000);
                    let mm = Math.floor((diff%3600000)/60000);
                    let ss = Math.floor((diff%60000)/1000);
                    document.getElementById('next-prayer').innerText = `باقي لصلاة ${next.n}`;
                    document.getElementById('timer').innerText = `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
                }, 1000);
            } catch(e) {}
        }

        navigator.geolocation.getCurrentPosition(p => init(p.coords.latitude, p.coords.longitude), () => init());
        setTimeout(() => { if(document.getElementById('timer').innerText === "00:00:00") init(); }, 2000);
    </script>
</body>
</html>
