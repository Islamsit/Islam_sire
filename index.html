<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إسلام ويب</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; padding-bottom: 90px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-btn.active { color: #059669; border-top: 3px solid #059669; }
        .qibla-box { width: 200px; height: 200px; margin: 20px auto; background: white; border-radius: 50%; border: 8px solid #ecfdf5; position: relative; display: flex; align-items: center; justify-content: center; shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #needle { position: absolute; width: 4px; height: 80px; background: #ef4444; top: 50%; left: 50%; transform-origin: top center; transform: translate(-50%, -100%) rotate(0deg); transition: transform 0.8s ease; border-radius: 2px; }
    </style>
</head>
<body>

    <header class="bg-emerald-800 text-white p-6 text-center rounded-b-[2rem] shadow-lg mb-6">
        <h1 class="text-2xl font-bold">إسلام ويب</h1>
        <p id="loc-status" class="text-[10px] opacity-60 mt-1 italic">مواقيت مكة المكرمة (افتراضي)</p>
    </header>

    <div class="max-w-md mx-auto px-5">
        
        <div id="prayers" class="tab-content active">
            <div class="bg-white rounded-3xl p-6 shadow-sm border border-emerald-50 text-center mb-5">
                <div id="p-name" class="text-emerald-600 font-bold text-sm mb-1">باقي للصلاة</div>
                <div id="timer" class="text-5xl font-black text-gray-800 tabular-nums">00:00:00</div>
            </div>
            <div id="p-list" class="space-y-3">
                <div class="flex justify-between p-4 bg-white rounded-xl shadow-sm border border-gray-50 font-bold"><span>الفجر</span><span class="text-emerald-700">05:12</span></div>
                <div class="flex justify-between p-4 bg-white rounded-xl shadow-sm border border-gray-50 font-bold"><span>الظهر</span><span class="text-emerald-700">12:24</span></div>
                <div class="flex justify-between p-4 bg-white rounded-xl shadow-sm border border-gray-50 font-bold"><span>العصر</span><span class="text-emerald-700">15:45</span></div>
                <div class="flex justify-between p-4 bg-white rounded-xl shadow-sm border border-gray-50 font-bold"><span>المغرب</span><span class="text-emerald-700">18:28</span></div>
                <div class="flex justify-between p-4 bg-white rounded-xl shadow-sm border border-gray-50 font-bold"><span>العشاء</span><span class="text-emerald-700">19:58</span></div>
            </div>
        </div>

        <div id="qibla" class="tab-content text-center">
            <div class="bg-white rounded-3xl p-8 shadow-sm">
                <h3 class="font-bold text-emerald-900 mb-2 italic">اتجاه القبلة</h3>
                <div class="qibla-box">
                    <div id="needle"></div>
                    <i class="fa-solid fa-kaaba text-emerald-800 text-4xl"></i>
                </div>
                <p id="q-deg" class="mt-4 text-emerald-700 font-black text-2xl">255°</p>
                <p class="text-[10px] text-gray-400 mt-2">السهم يشير لموقع الكعبة المشرفة</p>
            </div>
        </div>

        <div id="sebha" class="tab-content text-center">
            <div class="bg-white rounded-3xl p-10 shadow-sm border border-emerald-50">
                <div id="count" class="text-8xl font-black text-emerald-600 mb-8">0</div>
                <button onclick="add()" class="w-36 h-36 rounded-full bg-emerald-600 text-white text-5xl shadow-2xl active:scale-95 flex items-center justify-center mx-auto border-[10px] border-emerald-50">
                    <i class="fa fa-plus"></i>
                </button>
                <button onclick="res()" class="mt-8 text-gray-300 text-[10px] font-bold tracking-widest uppercase">تصفير العداد</button>
            </div>
        </div>

        <div id="azkar" class="tab-content">
            <div class="bg-white rounded-2xl p-6 border-r-8 border-emerald-500 shadow-sm mb-4">
                <p class="text-gray-600 italic">"سبحان الله وبحمده، عدد خلقه، ورضا نفسه، وزنة عرشه، ومداد كلماته"</p>
            </div>
            <div class="grid gap-3">
                <div class="p-5 bg-white rounded-2xl shadow-sm border border-emerald-50 flex justify-
