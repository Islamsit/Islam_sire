<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مواقيت الصلاة والعداد التنازلي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; }
        .bg-prayer-card { background: linear-gradient(135deg, #134e4a 0%, #065f46 100%); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center p-4">

    <div class="w-full max-w-md bg-white rounded-[2.5rem] shadow-2xl overflow-hidden mt-6">
        
        <div class="bg-prayer-card p-8 text-white text-center">
            <h2 id="next-prayer-name" class="text-xl opacity-90 font-medium">جاري حساب الصلاة القادمة...</h2>
            <div id="countdown" class="text-5xl font-bold my-4 tabular-nums tracking-tighter">00:00:00</div>
            <div id="location-name" class="text-xs opacity-70 bg-black/20 inline-block px-4 py-1 rounded-full">تحديد الموقع...</div>
        </div>

        <div id="prayer-list" class="p-6 space-y-3">
            <div class="animate-pulse space-y-4">
                <div class="h-14 bg-gray-200 rounded-2xl"></div>
                <div class="h-14 bg-gray-200 rounded-2xl"></div>
                <div class="h-14 bg-gray-200 rounded-2xl"></div>
            </div>
        </div>

    </div>

    <p class="mt-6 text-gray-400 text-sm">© 2026 موقع مواقيت الصلاة</p>

    <script>
        let prayerTimes = {};

        // 1. جلب البيانات من API
        async function fetchPrayers(lat, lon) {
            try {
                const res = await fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=4`);
                const data = await res.json();
                prayerTimes = data.data.timings;
                document.getElementById('location-name').innerText = data.data.meta.timezone;
                renderPrayers();
                startCountdown();
            } catch (err) {
                document.getElementById('next-prayer-name').innerText = "خطأ في تحميل البيانات";
            }
        }

        // 2. عرض المواعيد في القائمة
        function renderPrayers() {
            const list = { "الفجر": prayerTimes.Fajr, "الظهر": prayerTimes.Dhuhr, "العصر": prayerTimes.Asr, "المغرب": prayerTimes.Maghrib, "العشاء": prayerTimes.Isha };
            let html = '';
            for (const [name, time] of Object.entries(list)) {
                html += `
                    <div class="flex justify-between items-center p-4 bg-gray-50 rounded-2xl border border-gray-100 transition-all">
                        <span class="font-bold text-gray-700">${name}</span>
                        <span class="text-xl font-bold text-emerald-700">${time}</span>
                    </div>`;
            }
            document.getElementById('prayer-list').innerHTML = html;
        }

        // 3. تشغيل العداد التنازلي
        function startCountdown() {
            setInterval(() => {
                const now = new Date();
                const times = ["Fajr", "Dhuhr", "Asr", "Maghrib", "Isha"];
                const names = ["الفجر", "الظهر", "العصر", "المغرب", "العشاء"];
                
                let next = null;
                for (let i = 0; i < times.length; i++) {
                    const [h, m] = prayerTimes[times[i]].split(':');
                    const pDate = new Date();
                    pDate.setHours(h, m, 0);
                    if (pDate > now) {
                        next = { name: names[i], date: pDate };
                        break;
                    }
                }

                if (!next) { // إذا انتهت صلوات اليوم
                    const [h, m] = prayerTimes.Fajr.split(':');
                    const pDate = new Date();
                    pDate.setDate(pDate.getDate() + 1);
                    pDate.setHours(h, m, 0);
                    next = { name: "الفجر", date: pDate };
                }

                const diff = next.date - now;
                const hh = Math.floor(diff / 3600000);
                const mm = Math.floor((diff % 3600000) / 60000);
                const ss = Math.floor((diff % 60000) / 1000);

                document.getElementById('next-prayer-name').innerText = `باقي على صلاة ${next.name}`;
                document.getElementById('countdown').innerText = 
                    `${String(hh).padStart(2, '0')}:${String(mm).padStart(2, '0')}:${String(ss).padStart(2, '0')}`;
            }, 1000);
        }

        // 4. طلب الموقع أو استخدام مكة كافتراضي
        navigator.geolocation.getCurrentPosition(
            (pos) => fetchPrayers(pos.coords.latitude, pos.coords.longitude),
            () => fetchPrayers(21.4225, 39.8262) // إحداثيات مكة
        );
    </script>
</body>
</html>
