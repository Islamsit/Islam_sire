<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إسلام ويب</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f1f5f9; padding-bottom: 80px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-active { color: #059669 !important; border-top: 3px solid #059669; }
    </style>
</head>
<body>

    <header class="bg-emerald-800 text-white p-5 text-center rounded-b-3xl shadow-lg mb-4">
        <h1 class="text-xl font-bold">إسلام ويب</h1>
        <div id="stat" class="text-[9px] opacity-50 mt-1 italic">مواقيت مكة المكرمة</div>
    </header>

    <div class="max-w-md mx-auto px-4">
        
        <div id="p-tab" class="tab-content active text-center">
            <div class="bg-white rounded-2xl p-5 shadow-sm mb-4 border border-emerald-50">
                <div id="p-label" class="text-emerald-600 text-xs font-bold mb-1 italic">باقي لصلاة</div>
                <div id="timer" class="text-4xl font-black text-gray-800">00:00:00</div>
            </div>
            <div id="p-list" class="space-y-2">
                <div class="flex justify-between p-4 bg-white rounded-xl shadow-sm border border-gray-50 font-bold"><span>الفجر</span><span class="text-emerald-700">05:12</span></div>
                <div class="flex justify-between p-4 bg-white rounded-xl shadow-sm border border-gray-50 font-bold"><span>الظهر</span><span class="text-emerald-700">12:24</span></div>
                <div class="flex justify-between p-4 bg-white rounded-xl shadow-sm border border-gray-50 font-bold"><span>العصر</span><span class="text-emerald-700">15:45</span></div>
                <div class="flex justify-between p-4 bg-white rounded-xl shadow-sm border border-gray-50 font-bold"><span>المغرب</span><span class="text-emerald-700">18:28</span></div>
                <div class="flex justify-between p-4 bg-white rounded-xl shadow-sm border border-gray-50 font-bold"><span>العشاء</span><span class="text-emerald-700">19:58</span></div>
            </div>
        </div>

        <div id="q-tab" class="tab-content text-center">
            <div class="bg-white rounded-2xl p-10 shadow-sm border border-emerald-50">
                <h2 class="font-bold text-emerald-800 mb-6 underline">اتجاه القبلة</h2>
                <div class="w-40 h-40 border-4 border-emerald-100 rounded-full mx-auto relative flex items-center justify-center">
                    <div id="needle" class="absolute w-1 h-20 bg-red-500 top-1/2 left-1/2 -translate-x-1/2 -origin-bottom transition-transform duration-700" style="transform: translate(-50%, -100%) rotate(255deg);"></div>
                    <i class="fa-solid fa-kaaba text-emerald-800 text-4xl"></i>
                </div>
                <p id="q-deg" class="mt-6 font-black text-emerald-700 text-2xl">255°</p>
            </div>
        </div>

        <div id="s-tab" class="tab-content text-center">
            <div class="bg-white rounded-2xl p-10 shadow-sm border border-emerald-50">
                <div id="s-count" class="text-7xl font-black text-emerald-600 mb-8">0</div>
                <button onclick="inc()" class="w-32 h-32 rounded-full bg-emerald-600 text-white text-4xl shadow-xl active:scale-90 mx-auto border-8 border-emerald-50 flex items-center justify-center"><i class="fa fa-plus"></i></button>
                <button onclick="clr()" class="mt-8 text-gray-300 text-xs uppercase font-bold tracking-tighter">إعادة تصفير</button>
            </div>
        </div>

    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around py-2 z-50">
        <button onclick="sw('p-tab', this)" class="n-btn nav-active flex flex-col items-center w-1/3">
            <i class="fa-solid fa-clock text-xl"></i><span class="text-[9px] font-bold">المواقيت</span>
        </button>
        <button onclick="sw('q-tab', this)" class="n-btn text-gray-300 flex flex-col items-center w-1/3">
            <i class="fa-solid fa-compass text-xl"></i><span class="text-[9px] font-bold">القبلة</span>
        </button>
        <button onclick="sw('s-tab', this)" class="n-btn text-gray-300 flex flex-col items-center w-1/3">
            <i class="fa-solid fa-beads-prayers text-xl"></i><span class="text-[9px] font-bold">السبحة</span>
        </button>
    </nav>

    <script>
        let sc = 0;
        function inc(){ sc++; document.getElementById('s-count').innerText = sc; if(navigator.vibrate) navigator.vibrate(30); }
        function clr(){ sc = 0; document.getElementById('s-count').innerText = 0; }

        function sw(id, b) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.n-btn').forEach(n => { n.classList.add('text-gray-300'); n.classList.remove('nav-active'); });
            b.classList.remove('text-gray-300'); b.classList.add('nav-active');
        }

        let times = {"Fajr":"05:12","Dhuhr":"12:24","Asr":"15:45","Maghrib":"18:28","Isha":"19:58"};

        async function init(lat = 21.4225, lon = 39.8262) {
            try {
                const r = await fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=4`);
                const d = await r.json();
                times = d.data.timings;
                document.getElementById('stat').innerText = "تم التحديث لموقعك: " + d.data.meta.timezone;
                
                let h = '';
                const list = {"الفجر":times.Fajr,"الظهر":times.Dhuhr,"العصر":times.Asr,"المغرب":times.Maghrib,"العشاء":times.Isha};
                for(let [n,v] of Object.entries(list)) h += `<div class="flex justify-between p-4 bg-white rounded-xl shadow-sm border border-gray-50 font-bold text-gray-700"><span>${n}</span><span class="text-emerald-700 font-black">${v}</span></div>`;
                document.getElementById('p-list').innerHTML = h;

                const qr = await fetch(`https://api.aladhan.com/v1/gcref?latitude=${lat}&longitude=${lon}`);
                const qd = await qr.json();
                const deg = Math.round(qd.data.direction);
                document.getElementById('q-deg').innerText = deg + "°";
                document.getElementById('needle').style.transform = `translate(-50%, -100%) rotate(${deg}deg)`;
            } catch(e) {}
        }

        setInterval(() => {
            const now = new Date();
            let next = null;
            const names = {"Fajr":"الفجر","Dhuhr":"الظهر","Asr":"العصر","Maghrib":"المغرب","Isha":"العشاء"};
            for(let k in names){
                let [hh,mm] = times[k].split(':');
                let d = new Date(); d.setHours(hh,mm,0);
                if(d > now) { next = {n:names[k],d:d}; break; }
            }
            if(!next){ let [hh,mm]=times.Fajr.split(':'); let d=new Date(); d.setDate(d.getDate()+1); d.setHours(hh,mm,0); next={n:"الفجر",d}; }
            let diff = next.d - now;
            let h = Math.floor(diff/3600000); let m = Math.floor((diff%3600000)/60000); let s = Math.floor((diff%60000)/1000);
            document.getElementById('p-label').innerText = `المتبقي لصلاة ${next.n}`;
            document.getElementById('timer').innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }, 1000);

        navigator.geolocation.getCurrentPosition(p => init(p.coords.latitude, p.coords.longitude), () => init());
    </script>
</body>
</html>
