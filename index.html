<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إسلام ويب - التطبيق الشامل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f1f5f9; padding-bottom: 100px; }
        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .nav-item.active { color: #10b981; }
    </style>
</head>
<body>

    <header class="bg-emerald-800 text-white p-6 shadow-2xl rounded-b-[2.5rem] text-center mb-6">
        <h1 class="text-2xl font-bold">إسلام ويب</h1>
        <div id="location-text" class="text-[10px] opacity-60 mt-1 uppercase italic">جاري جلب المواقيت...</div>
    </header>

    <div class="container max-w-md mx-auto px-6">
        
        <section id="prayers" class="section active">
            <div class="bg-white rounded-3xl p-6 shadow-xl text-center mb-6 border border-emerald-50">
                <h2 id="next-prayer-name" class="text-emerald-600 font-bold mb-1">صلاة القادمة</h2>
                <div id="countdown" class="text-5xl font-black text-gray-800 tabular-nums">00:00:00</div>
            </div>
            <div id="prayer-list" class="space-y-3">
                </div>
        </section>

        <section id="tasbeeh" class="section">
            <div class="bg-white rounded-3xl p-10 shadow-xl text-center">
                <div id="sebha-count" class="text-7xl font-black text-emerald-600 mb-6">0</div>
                <button onclick="countUp()" class="w-36 h-36 rounded-full bg-emerald-600 text-white text-3xl shadow-lg active:scale-90 transition-all border-8 border-emerald-50 mx-auto flex items-center justify-center">
                    <i class="fa-solid fa-plus"></i>
                </button>
                <button onclick="resetCount()" class="mt-6 text-gray-400 text-xs underline">تصفير</button>
            </div>
        </section>

        <section id="radio" class="section">
            <div class="bg-white rounded-3xl p-6 shadow-lg text-center">
                <i class="fa-solid fa-radio text-5xl text-emerald-600 mb-4"></i>
                <h3 class="font-bold text-lg mb-4">إذاعة القرآن الكريم - القاهرة</h3>
                <audio controls class="w-full">
                    <source src="https://n02.radiojar.com/8s5u8umb28quv?rj-ttl=5&rj-tok=AAABjS_W-GMA-f6W-z-f-f-f" type="audio/mpeg">
                    متصفحك لا يدعم الراديو.
                </audio>
            </div>
        </section>

    </div>

    <nav class="fixed bottom-4 left-4 right-4 h-16 bg-white rounded-2xl shadow-2xl flex justify-around items-center px-2 z-50 border border-gray-100">
        <button onclick="showSection('prayers')" class="nav-item active flex flex-col items-center">
            <i class="fa-solid fa-clock text-xl"></i><span class="text-[10px] font-bold">المواقيت</span>
        </button>
        <button onclick="showSection('tasbeeh')" class="nav-item flex flex-col items-center text-gray-400">
            <i class="fa-solid fa-beads-prayers text-xl"></i><span class="text-[10px] font-bold">السبحة</span>
        </button>
        <button onclick="showSection('radio')" class="nav-item flex flex-col items-center text-gray-400">
            <i class="fa-solid fa-radio text-xl"></i><span class="text-[10px] font-bold">الراديو</span>
        </button>
    </nav>

    <script>
        let pTimes = {};
        let sCount = 0;

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => {
                i.classList.remove('active'); i.classList.add('text-gray-400');
            });
            event.currentTarget.classList.add('active');
            event.currentTarget.classList.remove('text-gray-400');
        }

        function countUp() { 
            sCount++; document.getElementById('sebha-count').innerText = sCount;
            if(navigator.vibrate) navigator.vibrate(30);
        }
        function resetCount() { sCount = 0; document.getElementById('sebha-count').innerText = 0; }

        async function getPrayers(lat, lon) {
            try {
                const r = await fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=4`);
                const d = await r.json();
                pTimes = d.data.timings;
                document.getElementById('location-text').innerText = "المنطقة: " + d.data.meta.timezone;
                render();
                startTimer();
            } catch(e) { 
                // إذا فشل الـ API نستخدم مكة كاحتياطي
                getPrayers(21.4225, 39.8262);
            }
        }

        function render() {
            const list = {"الفجر": pTimes.Fajr, "الظهر": pTimes.Dhuhr, "العصر": pTimes.Asr, "المغرب": pTimes.Maghrib, "العشاء": pTimes.Isha};
            let h = '';
            for(const [n, t] of Object.entries(list)) {
                h += `<div class="flex justify-between p-4 bg-white rounded-2xl shadow-sm border border-gray-50 mb-2 font-bold text-gray-700"><span>${n}</span><span class="text-emerald-600">${t}</span></div>`;
            }
            document.getElementById('prayer-list').innerHTML = h;
        }

        function startTimer() {
            setInterval(() => {
                if(!pTimes.Fajr) return;
                const now = new Date();
                const times = ["Fajr", "Dhuhr", "Asr", "Maghrib", "Isha"];
                const names = ["الفجر", "الظهر", "العصر", "المغرب", "العشاء"];
                let next = null;
                for(let i=0; i<times.length; i++) {
                    const [hh, mm] = pTimes[times[i]].split(':');
                    const d = new Date(); d.setHours(hh, mm, 0);
                    if(d > now) { next = {n: names[i], d: d}; break; }
                }
                if(!next) {
                    const [hh, mm] = pTimes.Fajr.split(':');
                    const d = new Date(); d.setDate(d.getDate()+1); d.setHours(hh, mm, 0);
                    next = {n: "الفجر", d: d};
                }
                const diff = next.d - now;
                const hrs = Math.floor(diff/3600000);
                const mins = Math.floor((diff%3600000)/60000);
                const secs = Math.floor((diff%60000)/1000);
                document.getElementById('next-prayer-name').innerText = `المتبقي لصلاة ${next.n}`;
                document.getElementById('countdown').innerText = `${String(hrs).padStart(2,'0')}:${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
            }, 1000);
        }

        // تحسين طلب الموقع: إذا لم يوافق المستخدم خلال 3 ثوانٍ، يعرض مكة تلقائياً
        let locationTimeout = setTimeout(() => {
            getPrayers(21.4225, 39.8262); // مكة
        }, 3000);

        navigator.geolocation.getCurrentPosition(
            (p) => {
                clearTimeout(locationTimeout);
                getPrayers(p.coords.latitude, p.coords.longitude);
            },
            () => {
                clearTimeout(locationTimeout);
                getPrayers(21.4225, 39.8262); // مكة كاحتياطي
            }
        );
    </script>
</body>
</html>
