<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة تركيا الخدمية | مواقيت وأدوات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #f0f2f5; scroll-behavior: smooth; }
        .service-card { transition: all 0.2s ease; border: 1px solid #f1f5f9; }
        .service-card:active { transform: scale(0.95); background: #f0fdf4; }
        .tab-content { display: none; animation: fadeIn 0.4s ease-out; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-item.active { color: #059669; border-top: 3px solid #059669; background: #f0fdf4; }
        #needle { transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="pb-24">

    <header class="bg-emerald-700 text-white p-6 rounded-b-[2.5rem] shadow-lg mb-6">
        <div class="flex justify-between items-center text-right">
            <div>
                <h1 class="text-2xl font-black italic">إسلام ويب</h1>
                <p class="text-[10px] opacity-80">دليلك الخدمي والديني في تركيا</p>
            </div>
            <div class="bg-emerald-800 p-2 px-4 rounded-xl text-xs font-bold shadow-inner" id="current-city">مرسين، تركيا</div>
        </div>
    </header>

    <div class="max-w-md mx-auto px-4">

        <div id="home-tab" class="tab-content active">
            <div class="bg-white rounded-3xl p-6 shadow-sm mb-6 text-center border-b-4 border-emerald-500">
                <p class="text-gray-500 text-sm font-bold mb-1">المتبقي للصلاة القادمة</p>
                <h2 class="text-5xl font-black text-slate-800 tracking-tighter tabular-nums" id="timer">00:00:00</h2>
            </div>

            <div class="mb-6 flex justify-center overflow-hidden rounded-xl bg-gray-50 py-2 text-[10px] text-gray-300 border border-dashed border-gray-200">
                مساحة إعلانية
            </div>

            <h3 class="font-black text-slate-700 mb-4 px-2 flex items-center">
                <i class="fa-solid fa-link ml-2 text-emerald-600"></i> روابط تهمك في تركيا
            </h3>
            <div class="grid grid-cols-2 gap-3 mb-8">
                <a href="https://www.turkiye.gov.tr/" target="_blank" class="service-card bg-white p-4 rounded-2xl flex flex-col items-center shadow-sm">
                    <i class="fa-solid fa-id-card text-blue-600 text-2xl mb-2"></i>
                    <span class="text-[11px] font-bold text-gray-700">سند إقامة</span>
                </a>
                <a href="https://randevu.nvi.gov.tr/" target="_blank" class="service-card bg-white p-4 rounded-2xl flex flex-col items-center shadow-sm">
                    <i class="fa-solid fa-calendar-check text-emerald-600 text-2xl mb-2"></i>
                    <span class="text-[11px] font-bold text-gray-700">موعد نفوس</span>
                </a>
                <a href="https://tckimlik.nvi.gov.tr/" target="_blank" class="service-card bg-white p-4 rounded-2xl flex flex-col items-center shadow-sm">
                    <i class="fa-solid fa-magnifying-glass text-orange-500 text-2xl mb-2"></i>
                    <span class="text-[11px] font-bold text-gray-700">تأكد من الكملك</span>
                </a>
                <a href="https://vatan.goc.gov.tr/" target="_blank" class="service-card bg-white p-4 rounded-2xl flex flex-col items-center shadow-sm">
                    <i class="fa-solid fa-passport text-purple-600 text-2xl mb-2"></i>
                    <span class="text-[11px] font-bold text-gray-700">مواعيد الهجرة</span>
                </a>
            </div>

            <div id="prayer-list" class="space-y-3 px-1 mb-8">
                </div>
        </div>

        <div id="tools-tab" class="tab-content text-center">
            <div class="bg-white rounded-3xl p-8 shadow-sm border mb-6">
                <h3 class="font-bold mb-4">بوصلة القبلة</h3>
                <button onclick="initCompass()" class="bg-emerald-600 text-white px-6 py-2 rounded-full text-sm font-bold mb-4 shadow-lg active:scale-95">تفعيل البوصلة</button>
                <div class="w-48 h-48 border-4 border-emerald-50 rounded-full mx-auto relative shadow-inner bg-slate-50">
                   <div id="needle" class="absolute top-1/2 left-1/2 w-1 h-20 bg-red-500 -translate-x-1/2 -translate-y-full origin-bottom"></div>
                   <i class="fa-solid fa-kaaba text-3xl absolute top-4 left-1/2 -translate-x-1/2 opacity-20"></i>
                </div>
