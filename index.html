<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إسلام ويب - تطبيق المسلم</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f1f5f9; padding-bottom: 90px; }
        .section { display: none; }
        .section.active { display: block; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .nav-item.active { color: #10b981; }
        .nav-item.active i { transform: scale(1.2); color: #10b981; }
    </style>
</head>
<body>

    <header class="bg-emerald-800 text-white p-8 shadow-2xl rounded-b-[3rem] text-center mb-8 border-b-4 border-emerald-600">
        <h1 class="text-3xl font-bold tracking-wide">إسلام ويب</h1>
        <div id="location-text" class="text-xs opacity-60 mt-2 tracking-widest uppercase italic">جاري تحديد موقعك...</div>
    </header>

    <div class="container max-w-md mx-auto px-6">
        
        <section id="prayers" class="section active">
            <div class="bg-white rounded-3xl p-6 shadow-xl border border-emerald-50 text-center mb-6">
                <h2 id="next-prayer-name" class="text-emerald-600 font-medium mb-1 italic">انتظار البيانات...</h2>
                <div id="countdown" class="text-5xl font-black text-gray-800 tabular-nums">00:00:00</div>
            </div>
            <div id="prayer-list" class="space-y-4">
                </div>
        </section>

        <section id="tasbeeh" class="section">
            <div class="bg-white rounded-[3rem] p-10 shadow-xl text-center border border-emerald-50 relative overflow-hidden">
                <div class="text-gray-400 text-sm mb-2 font-bold uppercase tracking-widest">مجموع التسبيح</div>
                <div id="sebha-count" class="text-8xl font-black text-emerald-600 mb-8 drop-shadow-md">0</div>
                <button onclick="countUp()" class="w-44 h-44 rounded-full bg-emerald-600 text-white text-4xl font-bold shadow-2xl active:scale-95 transition-all border-[12px] border-emerald-50 flex items-center justify-center mx-auto focus:outline-none">
                    <i class="fa-solid fa-fingerprint"></i>
                </button>
                <button onclick="resetCount()" class="mt-8 text-gray-400 text-xs hover:text-red-500 transition-colors font-bold uppercase underline">تصفير العداد</button>
            </div>
        </section>

        <section id="azkar" class="section">
            <div class="bg-white rounded-3xl p-6 shadow-lg border-r-8 border-emerald-500 mb-6">
                <h3 class="font-bold text-emerald-900 text-xl mb-3">ذكر اليوم</h3>
                <p id="azkar-content" class="text-gray-600 leading-relaxed text-lg">"سبحان الله وبحمده، سبحان الله العظيم"</p>
            </div>
            <div class="grid grid-cols-1 gap-4">
                <button class="p-5 rounded-2xl bg-white border border-emerald-100 shadow-sm text-emerald-700 font-bold flex items-center justify-between px-8 hover:bg-emerald-50">
                    <span>أذكار الصباح</span>
                    <i class="fa-solid fa-sun"></i>
                </button>
                <button class="p-5 rounded-2xl bg-white border border-blue-100 shadow-sm text-blue-700 font-bold flex items-
